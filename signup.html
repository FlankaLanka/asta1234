<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - My Game</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Firebase SDK (modular version) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-functions.js";  // Import Firebase Functions

        // Firebase configuration (your provided config)
        const firebaseConfig = {
            apiKey: "AIzaSyASmf5jo5XwUSMEE-PWPXh9J5HQbf0kbW4",
            authDomain: "atsa1234-ae1a2.firebaseapp.com",
            projectId: "atsa1234-ae1a2",
            storageBucket: "atsa1234-ae1a2.firebasestorage.app",
            messagingSenderId: "9350603529",
            appId: "1:9350603529:web:50241f95113529ef2429d8",
            measurementId: "G-Q1KKHXNLXY"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const functions = getFunctions(app);  // Initialize Firebase Functions

        // Firebase sign-up logic
        async function handleSignUp(email, password) {
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                console.log("User registered successfully:", user.email);
                window.location.href = "index.html";  // Redirect to login page after registration
            } catch (error) {
                console.error("Error:", error.message);
                document.getElementById("error-message").textContent = "Error: " + error.message;  // Show error message
            }
        }

        // Handle Stripe Payment
        async function handleStripeCheckout(amount) {
            // Ensure Stripe is loaded before using it
            const stripe = Stripe("pk_test_51RD9gaIR8BjfzLpaciyxpwm6GP2FUol1sHPNcktlupjKWCbPFSytxRpI9skKn2DyB6l7DFkxHMdZa5MfrGOfYgk400raoRP0yM"); // Your provided publishable key

            // Trigger the payment flow by calling Firebase function to create a payment intent (server-side)
            const createPaymentIntent = httpsCallable(functions, 'createPaymentIntent');
            try {
                const result = await createPaymentIntent({ amount: amount });
                const clientSecret = result.data.clientSecret;

                const { error, paymentIntent } = await stripe.confirmCardPayment(clientSecret, {
                    payment_method: {
                        card: { /* Your card details from Stripe.js */ },
                        billing_details: { name: document.getElementById("username").value }
                    }
                });

                if (error) {
                    console.error("Payment failed:", error.message);
                    document.getElementById("error-message").textContent = "Error: " + error.message;
                } else if (paymentIntent.status === 'succeeded') {
                    console.log("Payment succeeded, proceed to sign up!");
                    // Proceed with Firebase sign-up
                    const email = document.getElementById("email").value;
                    const password = document.getElementById("password").value;
                    handleSignUp(email, password);
                }
            } catch (error) {
                console.error("Payment error:", error.message);
                document.getElementById("error-message").textContent = "Payment error: " + error.message;
            }
        }

        // Handle form submission
        document.getElementById("signup-form").addEventListener("submit", (e) => {
            e.preventDefault();  // Prevent form refresh

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirm-password").value;

            // Ensure password and confirm password match
            if (password !== confirmPassword) {
                document.getElementById("error-message").textContent = "Passwords do not match!";
                return;
            }

            // Call Stripe to process payment before proceeding with sign-up
            const amount = 500;  // Example amount (500 cents = $5)
            handleStripeCheckout(amount);  // Redirect user to Stripe Checkout page
        });
    </script>
</head>
<body>
    <div id="signup-container">
        <h2>Create an Account</h2>
        
        <!-- Price Display Section -->
        <div id="price-display">
            <p>Sign up now for just <strong>$5.00</strong>!</p>
        </div>

        <form id="signup-form">
            <label for="email">Email:</label>
            <input type="email" id="email" required placeholder="Enter your email">

            <label for="username">Username:</label>
            <input type="text" id="username" required placeholder="Enter your username">

            <label for="password">Password:</label>
            <input type="password" id="password" required placeholder="Enter your password">

            <label for="confirm-password">Confirm Password:</label>
            <input type="password" id="confirm-password" required placeholder="Confirm your password">

            <label for="phone">Phone (optional):</label>
            <input type="text" id="phone" placeholder="Enter your phone number (optional)">

            <button type="submit" id="signup-btn">Sign Up</button>
        </form>
        <div id="error-message"></div>
        <p>Already have an account? <a href="index.html">Login</a></p>
    </div>

    <!-- Stripe.js (load this script at the bottom) -->
    <script src="https://js.stripe.com/v3/"></script>
</body>
</html>
